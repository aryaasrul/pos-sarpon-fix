<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login – Toko Terang</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-container">
    <h1>Part of Terang</h1>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="email@toko.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="kode">Password</label>
      <div class="password-container">
        <input type="password" id="kode" placeholder="Password" autocomplete="current-password">
        <button type="button" class="toggle-password" id="toggle-password" aria-label="Tampilkan/sembunyikan password">
          <img src="icons/Show.svg" alt="" id="eye-icon">
        </button>
      </div>
    </div>

    <button class="btn-login" id="btn-login">Masuk</button>

    <p class="error-message" id="error-message" role="alert"></p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Shared JS -->
  <script src="js/error-handler.js"></script>
  <script src="js/api.js"></script>

  <!-- Page JS -->
  <script src="js/login.js"></script>
</body>
</html>
