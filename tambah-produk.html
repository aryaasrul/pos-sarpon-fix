<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tambah Produk – Toko Terang</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="form-produk.css">
</head>
<body>

  <div class="header">
    <div class="back-button">
      <a href="katalog.html" aria-label="Kembali ke katalog">
        <img src="icons/Arrow-Left-2.svg" alt="">
      </a>
      <h1>Tambah Menu</h1>
    </div>
  </div>

  <div class="content">

    <!-- ─── FORM MENU ─────────────────────────────────────── -->
    <div id="menu-fields">
      <h2>Informasi Menu</h2>
      <div class="form-container">

        <div class="form-group">
          <label for="nama-produk">Nama Menu</label>
          <input type="text" id="nama-produk" placeholder="Nama Menu" maxlength="100">
        </div>

        <div class="form-group">
          <label for="kategori">Kategori</label>
          <select id="kategori" class="form-select">
            <option value="espresso_based">Espresso Based</option>
            <option value="filter">Filter</option>
            <option value="local_proses">Local Proses</option>
            <option value="non_coffee">Non Coffee</option>
          </select>
        </div>

        <div class="form-group form-group-inline">
          <label for="is-active">Aktif</label>
          <input type="checkbox" id="is-active" checked>
        </div>

        <div class="form-group">
          <label for="fixed-cost">Biaya Tetap (HPP dasar)</label>
          <input type="text" id="fixed-cost" placeholder="Rp 0" inputmode="numeric">
        </div>

        <div class="form-group">
          <label for="profit-margin">Margin Profit (%)</label>
          <input type="number" id="profit-margin" placeholder="30" min="0" max="500" value="30">
        </div>

        <div class="form-group">
          <label for="rounding-up">Pembulatan Harga (ke kelipatan)</label>
          <input type="number" id="rounding-up" placeholder="1000" min="1" value="1000">
        </div>

        <!-- Resep – hanya muncul untuk kategori kopi -->
        <div id="recipe-section" style="display:none">
          <h2>Resep Bean / Bahan</h2>
          <p class="hint">Setiap baris menghasilkan varian harga berbeda di kasir.</p>
          <div id="recipe-list"></div>
          <button id="btn-add-recipe" type="button" class="btn-add-item">
            <img src="icons/Plus-square.svg" alt="">
            Tambah Bahan
          </button>
        </div>

        <div class="button-group">
          <button id="btn-simpan" class="btn-simpan">Simpan</button>
          <button id="btn-hapus"  class="btn-hapus"  style="display:none">Hapus Menu</button>
        </div>
      </div>
    </div>

    <!-- ─── FORM BUKU ─────────────────────────────────────── -->
    <div id="book-fields" style="display:none">
      <h2>Informasi Buku</h2>
      <div class="form-container">

        <div class="form-group">
          <label for="book-title">Judul Buku</label>
          <input type="text" id="book-title" placeholder="Judul Buku" maxlength="200">
        </div>

        <div class="form-group">
          <label for="book-author">Penulis <span class="optional">(Opsional)</span></label>
          <input type="text" id="book-author" placeholder="Nama Penulis">
        </div>

        <div class="form-group">
          <label for="book-isbn">ISBN <span class="optional">(Opsional)</span></label>
          <input type="text" id="book-isbn" placeholder="ISBN">
        </div>

        <div class="form-group">
          <label for="book-purchase">Harga Beli</label>
          <input type="text" id="book-purchase" placeholder="Rp 0" inputmode="numeric">
        </div>

        <div class="form-group">
          <label for="book-selling">Harga Jual</label>
          <input type="text" id="book-selling" placeholder="Rp 0" inputmode="numeric">
        </div>

        <div class="form-group">
          <label for="book-stock">Stok</label>
          <input type="number" id="book-stock" placeholder="0" min="0" value="0">
        </div>

        <div class="form-group">
          <label for="book-description">Deskripsi <span class="optional">(Opsional)</span></label>
          <textarea id="book-description" placeholder="Deskripsi buku..." rows="3"></textarea>
        </div>

        <div class="button-group">
          <button id="btn-simpan" class="btn-simpan">Simpan</button>
          <button id="btn-hapus"  class="btn-hapus"  style="display:none">Hapus Buku</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Modal – konfirmasi hapus -->
  <div id="delete-confirmation-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-delete-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-delete-title">Konfirmasi Hapus</h2>
        <span class="close" aria-label="Tutup">&times;</span>
      </div>
      <div class="modal-body">
        <p>Apakah kamu yakin ingin menghapus produk ini?</p>
        <div class="modal-buttons" style="margin-top:16px">
          <button id="btn-cancel-delete" class="option-btn">Batal</button>
          <button id="btn-confirm-delete" class="option-btn danger">Hapus</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="navbar" role="navigation" aria-label="Navigasi utama">
    <div class="nav-item">
      <img src="icons/orders-icon.svg" alt="Kasir">
    </div>
    <div class="nav-item active">
      <img src="icons/database-icon.svg" alt="Katalog">
    </div>
    <div class="nav-item">
      <img src="icons/laporan-icon.svg" alt="Laporan">
    </div>
  </nav>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Shared JS -->
  <script src="js/error-handler.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>

  <!-- Page JS -->
  <script src="js/form-produk.js"></script>
</body>
</html>
