<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ubah Produk – Toko Terang</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="form-produk.css">
</head>
<body>

  <div class="header">
    <div class="back-button">
      <a href="katalog.html" aria-label="Kembali ke katalog">
        <img src="icons/Arrow-Left-2.svg" alt="">
      </a>
      <h1>Ubah Produk</h1>
    </div>
  </div>

  <div class="content">
    <h2>Informasi Produk</h2>

    <div class="form-container">

      <div class="form-section">
        <div class="photo-section">
          <label>Foto Produk <span class="optional">(Opsional)</span></label>
          <p class="photo-limit">Maks. 1 foto</p>
          <div class="photo-upload-container">
            <div class="photo-preview empty">
              <img src="icons/Plus-square.svg" alt="" class="camera-icon">
              <input type="file" id="photo-upload" accept="image/*" class="photo-input">
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="nama-produk">Nama Produk</label>
        <input type="text" id="nama-produk" placeholder="Nama Produk" maxlength="50">
        <div class="char-counter"><span id="nama-produk-count">0</span>/50</div>
      </div>

      <div class="form-group">
        <label for="harga-jual">Harga Jual</label>
        <input type="text" id="harga-jual" placeholder="Rp 0" inputmode="numeric">
        <div class="char-counter"><span id="harga-jual-count">0</span>/50</div>
      </div>

      <div class="form-group">
        <label for="harga-hpp">Harga HPP</label>
        <input type="text" id="harga-hpp" placeholder="Rp 0" inputmode="numeric">
        <div class="char-counter"><span id="harga-hpp-count">0</span>/50</div>
      </div>

      <div class="form-group">
        <div class="kategori-header">
          <label>Kategori</label>
          <button class="btn-atur-kategori" type="button">
            <img src="icons/Plus-square.svg" alt="">
            Atur
          </button>
        </div>
        <div class="selected-categories" id="selected-categories"></div>
      </div>

      <div class="button-group">
        <button id="btn-simpan" class="btn-simpan">Simpan</button>
        <button id="btn-hapus"  class="btn-hapus">
          <img src="icons/Delete.svg" alt="Hapus">
        </button>
      </div>
    </div>
  </div>

  <!-- Modal – pilih kategori -->
  <div id="kategori-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-kategori-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-kategori-title">Pilih Kategori</h2>
        <span class="close" aria-label="Tutup">&times;</span>
      </div>
      <div class="modal-body">
        <div class="kategori-list" id="kategori-list"></div>
        <div class="form-group" style="margin-top:16px">
          <label for="new-kategori">Tambah Kategori Baru</label>
          <div class="add-kategori-input">
            <input type="text" id="new-kategori" placeholder="Nama Kategori">
            <button id="btn-add-kategori" type="button">Tambah</button>
          </div>
        </div>
        <button id="btn-terapkan-kategori" class="btn-simpan" style="width:100%;margin-top:16px">Terapkan</button>
      </div>
    </div>
  </div>

  <!-- Modal – konfirmasi hapus -->
  <div id="delete-confirmation-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-delete-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-delete-title">Konfirmasi Hapus</h2>
        <span class="close" aria-label="Tutup">&times;</span>
      </div>
      <div class="modal-body">
        <p>Apakah kamu yakin ingin menghapus produk ini?</p>
        <div class="modal-buttons" style="margin-top:16px">
          <button id="btn-cancel-delete"  class="option-btn">Batal</button>
          <button id="btn-confirm-delete" class="option-btn danger">Hapus</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="navbar" role="navigation" aria-label="Navigasi utama">
    <div class="nav-item">
      <img src="icons/orders-icon.svg" alt="Kasir">
    </div>
    <div class="nav-item active">
      <img src="icons/database-icon.svg" alt="Katalog">
    </div>
    <div class="nav-item">
      <img src="icons/laporan-icon.svg" alt="Laporan">
    </div>
  </nav>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Shared JS -->
  <script src="js/error-handler.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>

  <!-- Page JS -->
  <script src="js/form-produk.js"></script>
</body>
</html>
